<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upcoming Live Shows</title>
<style>
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th, td {
    padding: 8px 12px;
    border: 1px solid #ccc;
    text-align: left;
  }
  th {
    background: #222;
    color: white;
  }
  a {
    color: #1a73e8;
    text-decoration: none;
  }
  .checkbox-true {
    color: green;
    font-weight: bold;
  }
  .checkbox-false {
    color: red;
    font-weight: normal;
  }
</style>
</head>
<body>
<h1>Upcoming Live Shows</h1>
<table id="gigsTable">
  <thead>

  </thead>
  <tbody></tbody>
</table>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2D1SSWPROsEE7jm5B4lKA1xBWzFRK1LahzGMkG_icgPldtVCEw4plClJko01AudHZHdX270nz3T7d/pub?output=csv";

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines.shift().split(",");

  return lines.map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = values[i]?.trim());
    return obj;
  });
}

function parseDateDDMMYYYY(str){

  // If it's a spreadsheet serial date
  if(!isNaN(str)){
    const excelEpoch = new Date(1899,11,30);
    const date = new Date(excelEpoch.getTime() + str * 86400000);
    return date;
  }

  // Normal DD/MM/YYYY
  const [day, month, year] = str.split("/");
  return new Date(`${year}-${month}-${day}`);
}

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const data = parseCSV(csv);
    const tbody = document.querySelector("#gigsTable tbody");
    const today = new Date();

    let currentYear = null;

function formatDate(date){
  const day = date.getDate();
  const month = date.toLocaleString('default',{month:'long'});

  const suffix =
    day % 10 === 1 && day !== 11 ? "st" :
    day % 10 === 2 && day !== 12 ? "nd" :
    day % 10 === 3 && day !== 13 ? "rd" : "th";

  return `${day}${suffix} ${month}`;
}
data.sort((a,b)=>parseDateDDMMYYYY(a.Date)-parseDateDDMMYYYY(b.Date));
data.forEach(gig => {

  if(!gig.Date) return;

  const gigDate = parseDateDDMMYYYY(gig.Date);
  if(gigDate < today) return;

  const year = gigDate.getFullYear();

  if(year !== currentYear){
    const yearRow = document.createElement("tr");
    yearRow.innerHTML = `<td colspan="4" style="font-size:22px;font-weight:bold;background:#eee">${year}</td>`;
    tbody.appendChild(yearRow);
    currentYear = year;
  }
  
const location = [
  gig.Venue,
  gig["Town/City"],
  gig.Country
].filter(v => v && v.trim() !== "").join(", ");
  
  const tr = document.createElement("tr");

  tr.innerHTML = `
  <td>${formatDate(gigDate)}</td>
  <td>${gig.Group}</td>
  <td>${location}</td>
  <td>${gig["Ticket Link"] ? `<a href="${gig["Ticket Link"]}" target="_blank">link to event</a>` : ""}</td>
`;

  tbody.appendChild(tr);

});
  });
</script>

</body>
</html>
